```html
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HR Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{

            width:100%;
            max-width:450px;

            border:none;

            border-radius:20px;

            overflow:hidden;

            box-shadow:0 10px 30px rgba(
                0,
                0,
                0,
                0.3
            );
        }

        .card-header{

            background:#16a34a;

            color:white;

            text-align:center;

            padding:25px;
        }

        .card-header h2{

            margin:0;

            font-weight:bold;
        }

        .card-body{

            padding:35px;
            background:white;
        }

        .form-control{

            height:50px;
            border-radius:10px;
        }

        .btn-login{

            width:100%;

            height:50px;

            border-radius:10px;

            font-size:18px;
        }

        .logo{

            font-size:60px;

            margin-bottom:10px;
        }

        .back-link{

            text-align:center;

            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="card login-card">

    <div class="card-header">

        <div class="logo">
            <i class="fas fa-user-tie"></i>
        </div>

        <h2>HR Login</h2>

        <p class="mb-0">
            Human Resource Portal
        </p>

    </div>

    <div class="card-body">

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter Username"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-success btn-login">

                <i class="fas fa-sign-in-alt"></i>
                Login as HR

            </button>

        </form>

        <div class="back-link">

            <a href="/">
                ← Back to Profile Selection
            </a>

        </div>

    </div>

</div>

</body>
</html>
```
