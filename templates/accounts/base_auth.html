<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HRMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.auth-card{

    width:100%;
    max-width:500px;

    border:none;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.card-header{

    background:#2563eb;

    color:white;

    text-align:center;

    padding:25px;
}

.card-header h2{

    margin:0;
    font-weight:bold;
}

.logo{

    font-size:60px;
    margin-bottom:10px;
}

.card-body{

    background:white;
    padding:35px;
}

.form-control{

    height:50px;
    border-radius:10px;
}

.btn-main{

    width:100%;
    height:50px;

    border-radius:10px;

    font-size:18px;
}

.bottom-link{

    text-align:center;

    margin-top:20px;
}

</style>

</head>

<body>

<div class="card auth-card">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
