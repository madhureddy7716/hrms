<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

    body{

        background:linear-gradient(
            135deg,
            #0f172a,
            #1e293b
        );

        min-height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;
    }

    .register-card{

        width:100%;
        max-width:500px;

        border:none;

        border-radius:20px;

        overflow:hidden;

        box-shadow:0 10px 30px rgba(
            0,
            0,
            0,
            0.3
        );
    }

    .card-header{

        background:#2563eb;

        color:white;

        text-align:center;

        padding:25px;
    }

    .logo{

        font-size:60px;

        margin-bottom:10px;
    }

    .card-body{

        padding:35px;

        background:white;
    }

    .form-control{

        height:50px;

        border-radius:10px;
    }

    .btn-register{

        width:100%;

        height:50px;

        border-radius:10px;

        font-size:18px;
    }

</style>
```

</head>

<body>

<div class="card register-card">

```
<div class="card-header">

    <div class="logo">

        <i class="fas fa-user-plus"></i>

    </div>

    <h2>

        Employee Registration

    </h2>

    <p class="mb-0">

        Create Your Account

    </p>

</div>

<div class="card-body">

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">

                Username

            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Email

            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Password

            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

        </div>
<div class="mb-3">

    <label class="form-label">

        Confirm Password

    </label>

    <input
        type="password"
        name="confirm_password"
        class="form-control"
        placeholder="Confirm Password"
        required>

</div>
        <button
            type="submit"
            class="btn btn-primary btn-register">

            <i class="fas fa-user-check"></i>

            Register

        </button>

    </form>

    <div class="text-center mt-3">

        Already have an account?

        <a href="/login/">

            Login Here

        </a>

    </div>

</div>
```

</div>

</body>
</html>
