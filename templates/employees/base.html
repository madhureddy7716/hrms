{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Employee Portal</title>

    <meta charset="utf-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f4f6f9;
            overflow-x:hidden;
            transition:0.3s;
        }

        .sidebar{

            width:270px;
            height:100vh;

            background:#1d2b44;

            position:fixed;

            left:0;
            top:0;

            padding:20px;

            z-index:1000;
        }

        .sidebar h2{

            color:white;

            margin-bottom:30px;

            font-size:28px;
            font-weight:bold;
        }

        .sidebar a{

            display:block;

            color:white;

            text-decoration:none;

            padding:14px 16px;

            margin-bottom:10px;

            border-radius:6px;

            font-size:18px;

            transition:0.3s;
        }

        .sidebar a:hover{

            background:#2563eb;

            color:white;
        }

        .content{

            margin-left:270px;

            width:calc(100% - 270px);

            min-height:100vh;

            padding:20px;

            transition:0.3s;
        }

        .theme-btn{

            position:fixed;

            top:15px;

            right:20px;

            z-index:9999;
        }

        /* DARK MODE */

        html.dark-mode,
html.dark-mode body{

    background:#0f172a !important;
    color:white !important;
}

        .dark-mode .sidebar{

            background:#111827 !important;
        }

        .dark-mode .content{

            background:#0f172a !important;
            color:white !important;
        }

        .dark-mode .card{

            background:#1e293b !important;
            color:white !important;
        }

        .dark-mode table{

            color:white !important;
        }

        .dark-mode th,
        .dark-mode td{

            background:#1e293b !important;
            color:white !important;
        }

        @media(max-width:768px){

            .sidebar{
                width:220px;
            }

            .content{

                margin-left:220px;

                width:calc(100% - 220px);
            }
        }

    </style>
<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark-mode");
}
</script>
</head>

<body>

    <!-- Theme Toggle -->

    <button
        class="btn btn-dark theme-btn"
        onclick="toggleTheme()">
        🌙 Theme
    </button>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>HRMS System</h2>

        <a href="/dashboard/">
            Dashboard
        </a>

        <a href="/profile/">
            Profile
        </a>

        <a href="/leave/">
            Apply Leave
        </a>

        <a href="/leave-history/">
            Leave History
        </a>

        <a href="/change-password/">
            Change Password
        </a>

        <a href="/logout/">
            Logout
        </a>

    </div>

    <!-- Content -->

    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

    <!-- Theme Script -->

    <script>

        function toggleTheme(){

            document.body.classList.toggle(
                "dark-mode"
            );

            if(
                document.body.classList.contains(
                    "dark-mode"
                )
            ){

                localStorage.setItem(
                    "theme",
                    "dark"
                );

            }else{

                localStorage.setItem(
                    "theme",
                    "light"
                );
            }
        }

        window.onload=function(){

            if(
                localStorage.getItem(
                    "theme"
                )==="dark"
            ){

                document.body.classList.add(
                    "dark-mode"
                );
            }
        }

    </script>

</body>
</html>
