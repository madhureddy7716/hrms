{% extends 'employees/base.html' %}

{% block content %}

<h1>Apply Leave</h1>

{% if success %}
<div style="
background:#d4edda;
color:#155724;
padding:15px;
margin-bottom:20px;
border:1px solid #c3e6cb;
border-radius:5px;
font-size:18px;
font-weight:bold;
">
✓ Leave Application Submitted Successfully!
</div>
{% endif %}

<form method="post">

    {% csrf_token %}

    <div class="mb-3">
        <label>Employee Name</label>
        <input type="text"
               name="employee_name"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Leave Type</label>
        <select name="leave_type"
                class="form-control"
                required>

            <option value="">Select Leave Type</option>
            <option>Casual Leave</option>
            <option>Sick Leave</option>
            <option>Earned Leave</option>

        </select>
    </div>

    <div class="mb-3">
        <label>From Date</label>
        <input type="date"
               name="from_date"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>To Date</label>
        <input type="date"
               name="to_date"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Reason</label>
        <textarea name="reason"
                  class="form-control"
                  rows="4"
                  required></textarea>
    </div>

    <button type="submit"
            class="btn btn-primary">
        Apply Leave
    </button>

</form>

{% endblock %}
