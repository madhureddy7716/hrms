```html
<!DOCTYPE html>
<html>

<head>

    <title>HR Portal</title>

    <meta charset="utf-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Prevent Dark Mode Flicker -->

    <script>
        if(localStorage.getItem("theme")==="dark"){
            document.documentElement.classList.add("dark-mode");
        }
    </script>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f4f6f9;
            overflow-x:hidden;
            transition:0.3s;
        }

        .sidebar{

            width:250px;
            height:100vh;

            position:fixed;

            left:0;
            top:0;

            background:#1f2937;

            color:white;

            padding-top:20px;

            z-index:1000;
        }

        .sidebar h3{
            font-size:28px;
            font-weight:bold;
        }

        .sidebar a{

            display:block;

            color:white;

            text-decoration:none;

            padding:15px 20px;

            font-size:18px;

            transition:0.3s;
        }

        .sidebar a:hover{
            background:#374151;
        }

        .content{

            margin-left:250px;

            width:calc(100% - 250px);

            min-height:100vh;

            padding:30px;

            transition:0.3s;
        }

        .theme-btn{

            position:fixed;

            top:15px;

            right:20px;

            z-index:9999;
        }

        /* DARK MODE */

        html.dark-mode,
        html.dark-mode body{

            background:#0f172a !important;
            color:white !important;
        }

        html.dark-mode .sidebar{
            background:#111827 !important;
        }

        html.dark-mode .content{
            background:#0f172a !important;
            color:white !important;
        }

        html.dark-mode .card{
            background:#1e293b !important;
            color:white !important;
        }

        html.dark-mode table{
            color:white !important;
        }

        html.dark-mode th,
        html.dark-mode td{
            background:#1e293b !important;
            color:white !important;
        }

        html.dark-mode input,
        html.dark-mode textarea,
        html.dark-mode select{
            background:#334155 !important;
            color:white !important;
            border:1px solid #475569 !important;
        }

        @media(max-width:768px){

            .sidebar{
                width:220px;
            }

            .content{

                margin-left:220px;

                width:calc(100% - 220px);
            }
        }

    </style>

</head>

<body>

    <button
        class="btn btn-dark theme-btn"
        onclick="toggleTheme()">
        🌙 Theme
    </button>

    <div class="sidebar">

        <h3 class="text-center">
            HR Portal
        </h3>

        <hr>

        <a href="/hr/dashboard/">
            Dashboard
        </a>

        <a href="/hr/employees/">
            Employee List
        </a>
<a href="{% url 'asset_list' %}">
    Assets
</a>
        <a href="/hr/leaves/">
            Leave Requests
        </a>

        <a href="/logout/">
            Logout
        </a>

    </div>

    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

    <script>

        function toggleTheme(){

            document.documentElement.classList.toggle(
                "dark-mode"
            );

            if(
                document.documentElement.classList.contains(
                    "dark-mode"
                )
            ){

                localStorage.setItem(
                    "theme",
                    "dark"
                );

            }else{

                localStorage.setItem(
                    "theme",
                    "light"
                );
            }
        }

    </script>

</body>

</html>
```
