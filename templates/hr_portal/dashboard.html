{% extends 'hr_portal/base_hr.html' %}

{% block content %}

<h1 class="mb-4">
    HR Dashboard
</h1>



<hr class="my-4">

<div class="row">

    <div class="col-md-4 mb-3">
        <div class="card shadow h-100">
            <div class="card-body">
                <h3>Employees</h3>
                <p>Manage Employee Records</p>

                <a href="/hr/employees/"
                   class="btn btn-primary">
                    Employee List
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card shadow h-100">
            <div class="card-body">
                <h3>Leave Management</h3>
                <p>Approve and Reject Leave Requests</p>

                <a href="/hr/leaves/"
                   class="btn btn-warning">
                    View Requests
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card shadow h-100">
            <div class="card-body">
                <h3>Asset Management</h3>
                <p>Manage Company Assets</p>

                <a href="/assets/"
                   class="btn btn-success">
                    View Assets
                </a>
            </div>
        </div>
    </div>

</div>

{% endblock %}
